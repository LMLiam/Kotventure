import org.gradle.api.artifacts.VersionCatalogsExtension

def catalog = rootProject.extensions.getByType(VersionCatalogsExtension).named('libs')
def ktlintVersion = catalog.findVersion('spotlessKtlint').get().requiredVersion

spotless {
    ratchetFrom 'origin/master'

    format 'misc', {
        target '*.gradle', '.gitattributes', '.gitignore'

        trimTrailingWhitespace()
        // Mirrors the repository-wide .editorconfig: indent_style = space, indent_size = 4.
        leadingTabsToSpaces(4)
        endWithNewline()
    }

    kotlin {
        ktlint(ktlintVersion)
    }
}
