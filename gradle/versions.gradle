import org.gradle.api.artifacts.VersionCatalogsExtension

def catalog = rootProject.extensions.getByType(VersionCatalogsExtension).named('libs')

// Compatibility shim for helper scripts that still read ext.versions during the catalog transition.
ext.versions = [:]
[
        'adventure-api': 'adventureApi',
        'kotest'       : 'kotest'
].each { legacyName, catalogName ->
    ext.versions[legacyName] = catalog.findVersion(catalogName).get().requiredVersion
}
