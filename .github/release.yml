changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: ⚠️ Breaking Changes
      labels:
        - breaking-change
    - title: ✨ Features
      labels:
        - "type: feature"
    - title: 🐛 Fixes
      labels:
        - "type: bug"
    - title: 🔧 Refactors
      labels:
        - "type: refactor"
    - title: 🧪 Tests
      labels:
        - "type: test"
    - title: 📝 Documentation
      labels:
        - "type: docs"
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 🔨 Chores & CI
      labels:
        - "type: chore"
    - title: Other Changes
      labels:
        - "*"
