name: Setup JDK and Gradle
description: Install Temurin JDK and configure the Gradle action (dependency/build caches, optional Build Scan).

inputs:
  java-version:
    description: JDK version for setup-java (matches the project toolchain by default).
    required: false
    default: '25'
  build-scan-publish:
    description: Publish a Gradle Build Scan (Develocity injection). Off by default — turns off local build-cache hits.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Set up Gradle (with Build Scan)
      if: inputs.build-scan-publish == 'true'
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: https://gradle.com/terms-of-service
        build-scan-terms-of-use-agree: 'yes'

    - name: Set up Gradle
      if: inputs.build-scan-publish != 'true'
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
