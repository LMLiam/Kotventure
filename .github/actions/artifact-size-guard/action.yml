name: Artifact Size Guard
description: Compare PR module JAR sizes against jars built from the PR base ref and warn on growth.

inputs:
  threshold:
    description: Percentage growth threshold to trigger a warning (e.g. 10).
    required: false
    default: '10'
  current-libs-dir:
    description: Directory tree containing PR (head) versioned module JARs.
    required: false
    default: 'pr-libs'
  baseline-libs-dir:
    description: Directory tree containing base-ref versioned module JARs.
    required: false
    default: 'base/build/libs'
  base-label:
    description: Human-readable label for the base side (shown in the comment footer).
    required: false
    default: 'PR base'

runs:
  using: composite
  steps:
    - name: Measure and compare artifact sizes
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        THRESHOLD: ${{ inputs.threshold }}
        CURRENT_LIBS_DIR: ${{ inputs.current-libs-dir }}
        BASELINE_LIBS_DIR: ${{ inputs.baseline-libs-dir }}
        BASE_LABEL: ${{ inputs.base-label }}
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const rawThreshold = process.env.THRESHOLD || '10';
          const parsedThreshold = Number.parseInt(rawThreshold, 10);
          if (!Number.isFinite(parsedThreshold) || parsedThreshold < 0) {
            core.warning(`Invalid threshold '${rawThreshold}'; defaulting to 10`);
          }
          const growthThreshold = Number.isFinite(parsedThreshold) && parsedThreshold >= 0 ? parsedThreshold : 10;
          const currentLibsDir = process.env.CURRENT_LIBS_DIR || 'pr-libs';
          const baselineLibsDir = process.env.BASELINE_LIBS_DIR || 'base/build/libs';
          const baseLabel = (process.env.BASE_LABEL || 'PR base').replace(/[\r\n|`]/g, '');

          function sanitizeModule(name) {
            const cleaned = String(name).replace(/[^a-zA-Z0-9_-]/g, '');
            return cleaned || 'unknown';
          }

          function parseModuleJar(filename) {
            if (!filename.endsWith('.jar') || filename.includes('-sources') || filename.includes('-javadoc')) {
              return null;
            }
            const match = filename.match(/^kotventure-(.+)-(\d+\.\d+\.\d+(?:[-+][A-Za-z0-9.]+)?)\.jar$/);
            if (!match) {
              return null;
            }
            return { module: sanitizeModule(match[1]), version: match[2] };
          }

          function versionKey(version) {
            return version.split(/[.+-]/).map((part) => {
              const n = Number.parseInt(part, 10);
              return Number.isFinite(n) ? n.toString().padStart(8, '0') : part;
            }).join('.');
          }

          function collectJars(rootDir) {
            const sizes = new Map();
            const bestVersion = new Map();
            if (!fs.existsSync(rootDir)) {
              return sizes;
            }

            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  walk(full);
                  continue;
                }
                if (!entry.isFile()) {
                  continue;
                }
                const parsed = parseModuleJar(entry.name);
                if (!parsed) {
                  continue;
                }
                const size = fs.statSync(full).size;
                const prev = bestVersion.get(parsed.module);
                if (!prev || versionKey(parsed.version) > versionKey(prev.version)) {
                  bestVersion.set(parsed.module, { version: parsed.version, size });
                  sizes.set(parsed.module, size);
                }
              }
            }

            walk(rootDir);
            return sizes;
          }

          const current = collectJars(currentLibsDir);
          const baseline = collectJars(baselineLibsDir);

          if (current.size === 0) {
            core.warning(`No PR JAR artifacts found under ${currentLibsDir}`);
            return;
          }
          if (baseline.size === 0) {
            core.warning(`No base JAR artifacts found under ${baselineLibsDir}; sizes reported without delta`);
          } else {
            core.info(`Compared ${current.size} PR module jar(s) against ${baseline.size} base jar(s)`);
          }

          const warnings = [];
          const modules = new Set([...current.keys(), ...baseline.keys()]);
          let table = '| Module | PR | Base | Delta |\n|--------|----|------|-------|\n';

          for (const mod of [...modules].sort((a, b) => a.localeCompare(b))) {
            const size = current.get(mod);
            const baseSize = baseline.get(mod);
            if (typeof size === 'number' && typeof baseSize === 'number' && baseSize > 0) {
              const sizeKb = (size / 1024).toFixed(1);
              const baseKb = (baseSize / 1024).toFixed(1);
              const delta = ((size - baseSize) / baseSize * 100).toFixed(1);
              const sign = Number(delta) > 0 ? '+' : '';
              const warn = parseFloat(delta) > growthThreshold ? ' !' : '';
              table += `| ${mod} | ${sizeKb} KB | ${baseKb} KB | ${sign}${delta}%${warn} |\n`;
              if (parseFloat(delta) > growthThreshold) {
                warnings.push(`${mod}: ${sign}${delta}% (${sizeKb} KB vs ${baseKb} KB base)`);
              }
            } else if (typeof size === 'number') {
              table += `| ${mod} | ${(size / 1024).toFixed(1)} KB | — | new |\n`;
            } else if (typeof baseSize === 'number') {
              table += `| ${mod} | — | ${(baseSize / 1024).toFixed(1)} KB | removed |\n`;
            }
          }

          const marker = '<!-- artifact-size-guard -->';
          let body = `${marker}\n## Artifact Sizes\n\n${table}\n`;
          if (warnings.length > 0) {
            body += `\n> [!WARNING]\n> Modules exceeding ${growthThreshold}% growth vs ${baseLabel}:\n`;
            for (const w of warnings) {
              body += `> - ${w}\n`;
            }
          }
          body += `\n<sub>PR jars vs jars built from ${baseLabel} (same module name, latest versioned jar each side)</sub>`;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });

          const existing = comments.find(
            (c) => c.user?.login === 'github-actions[bot]' && c.body.startsWith(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

          if (warnings.length > 0) {
            core.warning(`Artifact size growth exceeds ${growthThreshold}%: ${warnings.join('; ')}`);
          } else {
            core.info('Artifact size comment posted (no modules over threshold)');
          }
