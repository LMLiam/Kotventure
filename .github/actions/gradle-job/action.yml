name: Gradle Job
description: Set up JDK/Gradle, run tasks, and write a job summary. Requires checkout before use.

inputs:
  tasks:
    description: Space-separated Gradle tasks to run.
    required: true
  java-version:
    description: JDK version override.
    required: false
    default: '25'
  build-scan:
    description: Request a Gradle Build Scan (adds --scan). Requires Develocity/TOS configuration to publish.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up JDK and Gradle
      uses: ./.github/actions/setup-jdk-gradle
      with:
        java-version: ${{ inputs.java-version }}

    - name: Run Gradle
      id: gradle
      shell: bash
      env:
        GRADLE_TASKS: ${{ inputs.tasks }}
        BUILD_SCAN: ${{ inputs.build-scan }}
        GITHUB_TOKEN: ''
      run: |
        set -euo pipefail
        scan_flag=""
        if [[ "$BUILD_SCAN" == "true" ]]; then
          scan_flag="--scan"
        fi
        # shellcheck disable=SC2086
        ./gradlew ${GRADLE_TASKS} ${scan_flag} 2>&1 | tee gradle.log
        scan_url=$(grep -oE 'https://gradle\.com/s/[A-Za-z0-9_-]+' gradle.log | head -n1 || true)
        if [[ -n "$scan_url" ]]; then
          {
            echo "scan-url<<EOF"
            echo "$scan_url"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "### Build Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open scan]($scan_url)" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Write job summary
      if: always()
      shell: bash
      env:
        GRADLE_TASKS: ${{ inputs.tasks }}
      run: bash .github/scripts/write-gradle-job-summary.sh gradle.log
