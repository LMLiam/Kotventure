name: Gradle Job
description: Set up JDK/Gradle, run tasks, and write a job summary. Requires checkout before use.

inputs:
  tasks:
    description: Space-separated Gradle tasks to run.
    required: true
  java-version:
    description: JDK version override.
    required: false
    default: '25'
  build-scan:
    description: Publish a Gradle Build Scan (adds --scan).
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up JDK and Gradle
      uses: ./.github/actions/setup-jdk-gradle
      with:
        java-version: ${{ inputs.java-version }}

    - name: Run Gradle
      id: gradle
      shell: bash
      env:
        GRADLE_TASKS: ${{ inputs.tasks }}
        BUILD_SCAN: ${{ inputs.build-scan }}
      run: |
        set -euo pipefail
        scan_flag=""
        if [[ "$BUILD_SCAN" == "true" ]]; then
          scan_flag="--scan"
        fi
        # shellcheck disable=SC2086
        ./gradlew ${GRADLE_TASKS} ${scan_flag} 2>&1 | tee gradle.log
        # Extract build scan URL if present
        scan_url=$(grep -oP 'https://gradle\.com/s/\S+' gradle.log || true)
        if [[ -n "$scan_url" ]]; then
          echo "scan-url=$scan_url" >> "$GITHUB_OUTPUT"
          echo "### 🔍 [Build Scan]($scan_url)" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Write job summary
      if: always()
      shell: bash
      env:
        GRADLE_TASKS: ${{ inputs.tasks }}
      run: bash .github/scripts/write-gradle-job-summary.sh gradle.log
