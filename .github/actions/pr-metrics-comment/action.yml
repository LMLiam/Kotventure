name: PR Metrics Comment
description: Post one PR comment with Mermaid charts for coverage and JAR size deltas.

inputs:
  head-coverage-path:
    description: Path to head Kover XML report.
    required: false
    default: 'build/reports/kover/report.xml'
  base-coverage-path:
    description: Path to base Kover XML report (optional; absolute coverage only if missing).
    required: false
    default: 'base-coverage/report.xml'
  head-libs-dir:
    description: Directory tree of head module JARs.
    required: false
    default: 'pr-libs'
  base-libs-dir:
    description: Directory tree of base module JARs.
    required: false
    default: 'base-libs'
  threshold:
    description: JAR size growth warning threshold percent.
    required: false
    default: '10'
  base-label:
    description: Label for the base side in the comment footer.
    required: false
    default: 'PR base'

runs:
  using: composite
  steps:
    - name: Build metrics comment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        HEAD_COVERAGE_PATH: ${{ inputs.head-coverage-path }}
        BASE_COVERAGE_PATH: ${{ inputs.base-coverage-path }}
        HEAD_LIBS_DIR: ${{ inputs.head-libs-dir }}
        BASE_LIBS_DIR: ${{ inputs.base-libs-dir }}
        THRESHOLD: ${{ inputs.threshold }}
        BASE_LABEL: ${{ inputs.base-label }}
      with:
        script: |
          const run = require(`${process.env.GITHUB_ACTION_PATH}/lib/main.js`);
          await run({ github, context, core });
