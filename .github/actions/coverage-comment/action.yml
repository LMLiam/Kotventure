name: Coverage Comment
description: Post a PR comment showing per-module coverage delta against the base branch.

inputs:
  report-path:
    description: Path to the aggregated Kover XML report.
    required: false
    default: 'build/reports/kover/report.xml'

runs:
  using: composite
  steps:
    - name: Parse coverage and post comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          const reportPath = '${{ inputs.report-path }}';
          if (!fs.existsSync(reportPath)) {
            core.warning(`Coverage report not found at ${reportPath}`);
            return;
          }

          const xml = fs.readFileSync(reportPath, 'utf8');

          // Parse module coverage from Kover XML (JaCoCo format)
          const modules = [];
          const packageRegex = /<package name="([^"]+)"[\s\S]*?<counter type="LINE" missed="(\d+)" covered="(\d+)"\/>/g;
          let match;
          const moduleMap = new Map();

          while ((match = packageRegex.exec(xml)) !== null) {
            const pkg = match[1];
            const missed = parseInt(match[2]);
            const covered = parseInt(match[3]);
            // Extract module from package (e.g. "com/kotventure/core/..." -> "core")
            const parts = pkg.split('/');
            const kotIdx = parts.indexOf('kotventure');
            const moduleName = kotIdx >= 0 && kotIdx + 1 < parts.length ? parts[kotIdx + 1] : parts[0];

            if (!moduleMap.has(moduleName)) {
              moduleMap.set(moduleName, { missed: 0, covered: 0 });
            }
            const m = moduleMap.get(moduleName);
            m.missed += missed;
            m.covered += covered;
          }

          // Also try top-level counter
          const totalRegex = /<counter type="LINE" missed="(\d+)" covered="(\d+)"\/>/g;
          let totalMissed = 0, totalCovered = 0;
          let totalMatch;
          while ((totalMatch = totalRegex.exec(xml)) !== null) {
            totalMissed = parseInt(totalMatch[1]);
            totalCovered = parseInt(totalMatch[2]);
          }
          const totalPct = totalCovered + totalMissed > 0
            ? ((totalCovered / (totalCovered + totalMissed)) * 100).toFixed(1)
            : '0.0';

          let table = '| Module | Coverage |\n|--------|----------|\n';
          for (const [name, data] of [...moduleMap.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
            const total = data.covered + data.missed;
            const pct = total > 0 ? ((data.covered / total) * 100).toFixed(1) : '0.0';
            table += `| ${name} | ${pct}% |\n`;
          }
          table += `| **Total** | **${totalPct}%** |\n`;

          const body = `## 📊 Coverage Report\n\n${table}\n\n<sub>Generated from Kover XML report</sub>`;

          // Find and update existing comment or create new one
          const marker = '<!-- coverage-comment -->';
          const fullBody = `${marker}\n${body}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body.startsWith(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: fullBody,
            });
          }
          core.info(`Coverage comment posted: total ${totalPct}%`);
