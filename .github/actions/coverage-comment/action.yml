name: Coverage Comment
description: Post a PR comment with absolute per-module line coverage from a Kover XML report.

inputs:
  report-path:
    description: Path to the aggregated Kover XML report.
    required: false
    default: 'build/reports/kover/report.xml'

runs:
  using: composite
  steps:
    - name: Parse coverage and post comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        REPORT_PATH: ${{ inputs.report-path }}
      with:
        script: |
          const fs = require('fs');

          const reportPath = process.env.REPORT_PATH || 'build/reports/kover/report.xml';
          if (!fs.existsSync(reportPath)) {
            core.warning(`Coverage report not found at ${reportPath}`);
            return;
          }

          const xml = fs.readFileSync(reportPath, 'utf8');

          function moduleFromPackage(pkg) {
            const parts = pkg.split('/');
            const kotIdx = parts.indexOf('kotventure');
            if (kotIdx < 0) {
              return sanitizeModule(parts[0] || 'unknown');
            }
            const after = parts.slice(kotIdx + 1);
            if (after[0] === 'test' && after[1] === 'snapshot') {
              return 'test-snapshot';
            }
            return sanitizeModule(after[0] || 'unknown');
          }

          function sanitizeModule(name) {
            const cleaned = String(name).replace(/[^a-zA-Z0-9_-]/g, '');
            return cleaned || 'unknown';
          }

          function packageLineCounter(packageBody) {
            const stripped = packageBody
              .replace(/<class[\s\S]*?<\/class>/g, '')
              .replace(/<sourcefile[\s\S]*?<\/sourcefile>/g, '');
            const match = stripped.match(/<counter type="LINE" missed="(\d+)" covered="(\d+)"\/>/);
            if (!match) {
              return null;
            }
            return { missed: parseInt(match[1], 10), covered: parseInt(match[2], 10) };
          }

          const moduleMap = new Map();
          const packageRegex = /<package name="([^"]+)">([\s\S]*?)<\/package>/g;
          let packageMatch;
          while ((packageMatch = packageRegex.exec(xml)) !== null) {
            const counters = packageLineCounter(packageMatch[2]);
            if (!counters) {
              continue;
            }
            const moduleName = moduleFromPackage(packageMatch[1]);
            if (!moduleMap.has(moduleName)) {
              moduleMap.set(moduleName, { missed: 0, covered: 0 });
            }
            const entry = moduleMap.get(moduleName);
            entry.missed += counters.missed;
            entry.covered += counters.covered;
          }

          const rootXml = xml.replace(/<package[\s\S]*?<\/package>/g, '');
          const totalMatch = rootXml.match(/<counter type="LINE" missed="(\d+)" covered="(\d+)"\/>/);
          let totalMissed = 0;
          let totalCovered = 0;
          if (totalMatch) {
            totalMissed = parseInt(totalMatch[1], 10);
            totalCovered = parseInt(totalMatch[2], 10);
          } else {
            for (const data of moduleMap.values()) {
              totalMissed += data.missed;
              totalCovered += data.covered;
            }
          }
          const totalLines = totalCovered + totalMissed;
          const totalPct = totalLines > 0
            ? ((totalCovered / totalLines) * 100).toFixed(1)
            : '0.0';

          let table = '| Module | Coverage |\n|--------|----------|\n';
          for (const [name, data] of [...moduleMap.entries()].sort((a, b) => a[0].localeCompare(b[0]))) {
            const total = data.covered + data.missed;
            const pct = total > 0 ? ((data.covered / total) * 100).toFixed(1) : '0.0';
            table += `| ${name} | ${pct}% |\n`;
          }
          table += `| **Total** | **${totalPct}%** |\n`;

          const marker = '<!-- coverage-comment -->';
          const fullBody = `${marker}\n## Coverage Report\n\n${table}\n\n<sub>Absolute per-module line coverage from this run's Kover XML (not a base-branch delta)</sub>`;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });

          const existing = comments.find(
            (c) => c.user?.login === 'github-actions[bot]' && c.body.startsWith(marker)
          );
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: fullBody,
            });
          }
          core.info(`Coverage comment posted: total ${totalPct}%`);
