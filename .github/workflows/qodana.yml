name: Qodana

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write
  security-events: write

jobs:
  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Scan with Qodana
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        with:
          cache-dir: ${{ runner.temp }}/qodana/caches
          use-caches: true
          primary-cache-key: qodana-2026.1-${{ runner.os }}-${{ hashFiles('qodana.yaml', 'settings.gradle', 'build.gradle', 'gradle.properties', 'gradle/**/*.gradle', 'gradle/libs.versions.toml') }}
          additional-cache-key: qodana-2026.1-${{ runner.os }}-
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Normalize Qodana SARIF regions
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          sarif_file="${RUNNER_TEMP}/qodana/results/qodana.sarif.json"

          if [[ ! -f "$sarif_file" ]]; then
            echo "Qodana SARIF not found at $sarif_file; skipping normalization."
            exit 0
          fi

          jq '
            def normalize_region:
              if type == "object" then
                (
                  if has("startLine") and (.startLine | type == "number") and .startLine < 1 then
                    .startLine = 1
                  else
                    .
                  end
                )
                | (
                  if has("startColumn") and (.startColumn | type == "number") and .startColumn < 1 then
                    .startColumn = 1
                  else
                    .
                  end
                )
              else
                .
              end;

            walk(if type == "object" and has("region") then .region |= normalize_region else . end)
          ' "$sarif_file" > "${sarif_file}.tmp"
          mv "${sarif_file}.tmp" "$sarif_file"

      - name: Upload Qodana results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
