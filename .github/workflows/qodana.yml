name: Qodana

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - 'modules/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'buildSrc/**'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - 'qodana.yaml'
      - 'jitpack.yml'
      - 'release-please-config.json'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/scripts/**'
      - '.github/dependabot.yml'
      - '.github/code-paths-filter.yml'
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Heavy CI gate
    uses: ./.github/workflows/heavy-ci-gate.yml
    permissions:
      contents: read
      pull-requests: read

  qodana:
    name: Qodana
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Scan with Qodana
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        with:
          cache-dir: ${{ runner.temp }}/qodana/caches
          use-caches: true
          primary-cache-key: qodana-2026.1-${{ runner.os }}-${{ hashFiles('qodana.yaml', 'settings.gradle', 'build.gradle', 'gradle.properties', 'gradle/**/*.gradle', 'gradle/libs.versions.toml') }}
          additional-cache-key: qodana-2026.1-${{ runner.os }}-
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Normalize Qodana SARIF regions
        if: always()
        shell: bash
        run: bash .github/scripts/normalize-qodana-sarif.sh "${{ runner.temp }}/qodana/results/qodana.sarif.json"

      - name: Upload Qodana results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
