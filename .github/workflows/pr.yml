name: PR

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:

  # ─── Title validation ────────────────────────────────────────────────────────
  title:
    name: Title
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Merge queue placeholder
        if: github.event_name == 'merge_group'
        run: echo "Title already validated on the PR; reporting success for merge_group."

      - name: Checkout trusted validator
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Validate pull request title
        if: github.event_name == 'pull_request_target'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash .github/scripts/validate-conventional-title.sh "$PR_TITLE"

  # ─── Commit subjects ────────────────────────────────────────────────────────
  commits:
    name: Commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Merge queue placeholder
        if: github.event_name == 'merge_group'
        run: echo "Commits already validated on the PR; reporting success for merge_group."

      - name: Checkout trusted validator
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Collect commit subjects
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMITS_URL: ${{ github.event.pull_request.commits_url }}
        run: gh api --paginate "$COMMITS_URL" --jq '.[].commit.message | split("\n")[0]' > commit-subjects.txt

      - name: Validate commit subjects
        if: github.event_name == 'pull_request_target'
        run: bash .github/scripts/validate-conventional-title.sh --stdin < commit-subjects.txt

  # ─── Labels ─────────────────────────────────────────────────────────────────
  labels:
    name: Labels
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Label by changed paths
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          sync-labels: true
