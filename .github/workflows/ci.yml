name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  merge_group:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      tasks:
        description: Gradle tasks (space-separated). Empty uses the default CI task set, or :module:build when module is set.
        required: false
        default: ''
        type: string
      module:
        description: Optional Gradle project name (e.g. core, minimessage). Empty runs the full multi-project default.
        required: false
        default: ''
        type: string

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  CI Pipeline                                                               ║
# ║                                                                            ║
# ║  Tier 0 ─ Triage        Gate → Changes (fast, always runs)                ║
# ║  Tier 1 ─ Core          Lint ┤ Build (parallel, first feedback)            ║
# ║  Tier 2 ─ Analysis      CodeQL │ Qodana │ Vanilla (after T1 passes)        ║
# ║  Policy ─ Independent   Dependencies │ Commits                             ║
# ║  Status ─ Aggregator    Required check (merge gate + merge queue)          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

jobs:

  # ╭──────────────────────────────────────────────────────────────────────────╮
  # │ Tier 0: Triage                                                           │
  # ╰──────────────────────────────────────────────────────────────────────────╯

  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Decide whether heavy CI should run
        id: decide
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const ALWAYS = () => {
              core.setOutput('run', 'true');
            };

            const releaseOnlyFiles = new Set([
              'CHANGELOG.md',
              '.release-please-manifest.json',
            ]);

            if (context.eventName === 'push') {
              const commitMsg = context.payload.head_commit?.message || '';
              if (/^chore\(master\): release\b/.test(commitMsg)) {
                const comparison = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: context.payload.before,
                  head: context.payload.after,
                });
                const unexpected = comparison.data.files
                  .map(f => f.filename)
                  .filter(name => !releaseOnlyFiles.has(name));
                if (unexpected.length === 0) {
                  core.info('Release-please merge commit (changelog/manifest only); skip heavy CI.');
                  core.setOutput('run', 'false');
                  return;
                }
                core.info(`Release commit has non-release changes; run heavy CI: ${unexpected.join(', ')}`);
              }
              ALWAYS();
              return;
            }

            if (context.eventName !== 'pull_request') {
              core.info(`Event ${context.eventName}: always run heavy CI.`);
              ALWAYS();
              return;
            }

            const headRef = context.payload.pull_request.head.ref;
            if (!headRef.startsWith('release-please--')) {
              core.info(`Branch ${headRef}: not a release-please PR; run heavy CI.`);
              ALWAYS();
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const unexpected = files
              .map((file) => file.filename)
              .filter((name) => !releaseOnlyFiles.has(name));

            if (unexpected.length === 0) {
              core.info('Pure release-please PR; skip heavy CI.');
              core.setOutput('run', 'false');
              return;
            }

            core.info(`Release-please PR has non-release changes; run heavy CI: ${unexpected.join(', ')}`);
            ALWAYS();

  changes:
    name: Detect changes
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.resolve.outputs.code }}
      vanilla: ${{ steps.resolve.outputs.vanilla }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Path filter
        id: filter
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            code:
              - 'modules/**'
              - 'gradle/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'gradle.properties'
              - 'gradlew'
              - 'gradlew.bat'
              - 'buildSrc/**'
              - '.editorconfig'
              - '.gitattributes'
              - '.gitignore'
              - 'qodana.yaml'
              - 'jitpack.yml'
              - 'release-please-config.json'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/dependabot.yml'
            vanilla:
              - 'modules/core/**'
              - 'gradle/vanilla-conformance.gradle'
              - 'buildSrc/**'
              - '.github/scripts/vanilla-fixture-cache-key.sh'
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-jdk-gradle/**'
              - '.github/actions/publish-junit-report/**'

      - name: Resolve flags
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_CODE: ${{ steps.filter.outputs.code }}
          FILTER_VANILLA: ${{ steps.filter.outputs.vanilla }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "push" ]]; then
            echo "code=${FILTER_CODE}" >> "$GITHUB_OUTPUT"
            echo "vanilla=${FILTER_VANILLA}" >> "$GITHUB_OUTPUT"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "vanilla=true" >> "$GITHUB_OUTPUT"
          fi

  # ╭──────────────────────────────────────────────────────────────────────────╮
  # │ Tier 1: Core (fast feedback — lint and build in parallel)                │
  # ╰──────────────────────────────────────────────────────────────────────────╯

  lint:
    name: Lint
    needs: [gate, changes]
    if: needs.gate.outputs.run == 'true' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check one type declaration per file
        run: bash .github/scripts/check-one-declaration-per-file.sh

      - name: Test pr-metrics-comment action
        run: node --test .github/actions/pr-metrics-comment/test/*.test.js

      - name: Run linters
        uses: ./.github/actions/gradle-job
        with:
          tasks: spotlessCheck ktlintCheck

  build:
    name: Build
    needs: [gate, changes]
    if: needs.gate.outputs.run == 'true' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
    steps:
      - name: Resolve Gradle tasks
        id: tasks
        env:
          INPUT_TASKS: ${{ github.event.inputs.tasks || '' }}
          INPUT_MODULE: ${{ github.event.inputs.module || '' }}
        run: |
          set -euo pipefail
          tasks="${INPUT_TASKS#"${INPUT_TASKS%%[![:space:]]*}"}"
          tasks="${tasks%"${tasks##*[![:space:]]}"}"
          module="${INPUT_MODULE#"${INPUT_MODULE%%[![:space:]]*}"}"
          module="${module%"${module##*[![:space:]]}"}"

          if [[ -n "$module" && ! "$module" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "Invalid module name: $module" >&2
            exit 1
          fi

          if [[ -z "$tasks" ]]; then
            if [[ -n "$module" ]]; then
              tasks=":${module}:build koverVerify verifyBomConsumerVersionlessDependencies verifyReleaseVersionConsistency koverXmlReport koverHtmlReport dokkaGenerate"
            else
              tasks="build dokkaGenerate koverXmlReport koverHtmlReport"
            fi
          fi

          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"
          echo "Resolved Gradle tasks: $tasks"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run build
        uses: ./.github/actions/gradle-job
        with:
          tasks: ${{ steps.tasks.outputs.tasks }}

      - name: Collect CI metrics
        run: bash .github/scripts/collect-ci-metrics.sh

      - name: Upload CI metrics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-metrics
          path: ci-metrics.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish JUnit test report
        if: always()
        uses: ./.github/actions/publish-junit-report
        with:
          check_name: Test Report
          report_paths: modules/*/build/test-results/test/TEST-*.xml

      - name: Upload test results and reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-results
          path: |
            modules/*/build/test-results/test
            modules/*/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/kover
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload module jars
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: module-jars
          path: build/libs/kotventure-*.jar
          if-no-files-found: ignore
          retention-days: 14

      - name: Stage baseline cache tree
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          rm -rf .ci-baseline
          mkdir -p .ci-baseline/libs
          if [[ -f build/reports/kover/report.xml ]]; then
            cp build/reports/kover/report.xml .ci-baseline/report.xml
          fi
          if [[ -f ci-metrics.json ]]; then
            cp ci-metrics.json .ci-baseline/ci-metrics.json
          fi
          cp build/libs/kotventure-*.jar .ci-baseline/libs/ 2>/dev/null || true

      - name: Cache baseline coverage and jars for PRs
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ci-baseline
          key: ci-baseline-${{ github.sha }}

      - name: Upload Dokka preview
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dokka-preview
          path: modules/*/build/dokka/html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build artifacts
        if: failure() || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-build-artifacts
          path: build/libs
          if-no-files-found: ignore
          retention-days: 7

  pr-feedback:
    name: PR feedback
    needs: [build]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && needs.build.result != 'cancelled'
      && needs.build.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore base baseline cache
        id: base-cache
        continue-on-error: true
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ci-baseline
          key: ci-baseline-${{ github.event.pull_request.base.sha }}
          fail-on-cache-miss: false

      - name: Materialize base paths from cache
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p base-coverage base-libs base-metrics
          if [[ -f .ci-baseline/report.xml ]]; then
            cp .ci-baseline/report.xml base-coverage/report.xml
          fi
          if [[ -f .ci-baseline/ci-metrics.json ]]; then
            cp .ci-baseline/ci-metrics.json base-metrics/ci-metrics.json
          fi
          if compgen -G '.ci-baseline/libs/kotventure-*.jar' > /dev/null; then
            cp .ci-baseline/libs/kotventure-*.jar base-libs/
          fi

      - name: Download head coverage report
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: coverage-report
          path: build/reports/kover

      - name: Download head module jars
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: module-jars
          path: pr-libs

      - name: Download head CI metrics
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ci-metrics
          path: head-metrics

      - name: Download base artifacts from CI run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/download-base-metrics.sh

      - name: Decide if base jar rebuild is needed
        id: need-base-jars
        continue-on-error: true
        run: |
          set -euo pipefail
          if find base-libs -name 'kotventure-*.jar' 2>/dev/null | grep -q .; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK and Gradle for base jar fallback
        if: steps.need-base-jars.outputs.needed == 'true'
        continue-on-error: true
        uses: ./.github/actions/setup-jdk-gradle
        with:
          build-scan-publish: 'false'

      - name: Build base jars if still missing
        if: steps.need-base-jars.outputs.needed == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ''
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/build-base-jars.sh

      - name: Resolve base label
        id: base-label
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: echo "label=${BASE_REF}@${BASE_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Post metrics comment
        continue-on-error: true
        uses: ./.github/actions/pr-metrics-comment
        with:
          head-coverage-path: build/reports/kover/report.xml
          base-coverage-path: base-coverage/report.xml
          head-libs-dir: pr-libs
          base-libs-dir: base-libs
          base-label: ${{ steps.base-label.outputs.label }}

  # ╭──────────────────────────────────────────────────────────────────────────╮
  # │ Tier 2: Deep Analysis (runs only after Tier 1 passes)                    │
  # ╰──────────────────────────────────────────────────────────────────────────╯

  codeql:
    name: CodeQL (${{ matrix.language }})
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Set up JDK and Gradle
        if: matrix.build-mode == 'manual'
        uses: ./.github/actions/setup-jdk-gradle

      - name: Build for CodeQL
        if: matrix.build-mode == 'manual'
        run: ./gradlew classes testClasses -x test -Pkotlin.incremental=false --no-build-cache --rerun-tasks

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ matrix.language }}"

  qodana:
    name: Qodana
    needs: [lint, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      checks: write
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Scan with Qodana
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        with:
          cache-dir: ${{ runner.temp }}/qodana/caches
          use-caches: true
          primary-cache-key: qodana-2026.1-${{ runner.os }}-${{ hashFiles('qodana.yaml', 'settings.gradle', 'build.gradle', 'gradle.properties', 'gradle/**/*.gradle', 'gradle/libs.versions.toml') }}
          additional-cache-key: qodana-2026.1-${{ runner.os }}-
          upload-result: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Normalize Qodana SARIF regions
        if: always()
        shell: bash
        run: bash .github/scripts/normalize-qodana-sarif.sh "${{ runner.temp }}/qodana/results/qodana.sarif.json"

      - name: Upload Qodana results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  vanilla:
    name: Vanilla conformance
    needs: [lint, build, changes]
    if: needs.changes.outputs.vanilla == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Resolve Minecraft fixture cache key
        id: fixture
        run: .github/scripts/vanilla-fixture-cache-key.sh >> "$GITHUB_OUTPUT"

      - name: Cache Minecraft conformance fixtures
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: modules/core/build/vanilla-conformance
          key: ${{ steps.fixture.outputs.key }}

      - name: Verify restored fixture checksum
        run: |
          set -euo pipefail
          version="${{ steps.fixture.outputs.version }}"
          expected="${{ steps.fixture.outputs.sha1 }}"
          bundle="modules/core/build/vanilla-conformance/${version}/server-${version}-bundle.jar"
          if [[ ! -f "$bundle" ]]; then
            echo "No cached server bundle at $bundle; Gradle will download and verify."
            exit 0
          fi
          actual="$(shasum -a 1 "$bundle" | awk '{ print $1 }')"
          if [[ "$actual" != "$expected" ]]; then
            echo "Cached fixture SHA-1 mismatch (expected $expected, got $actual); removing corrupted cache entry."
            rm -f "$bundle"
            exit 0
          fi
          echo "Cached fixture SHA-1 matches $expected."

      - name: Run vanilla conformance suites
        run: ./gradlew :core:vanillaConformanceTest

      - name: Publish JUnit test report
        if: always()
        uses: ./.github/actions/publish-junit-report
        with:
          check_name: Vanilla Conformance Report
          report_paths: modules/core/build/test-results/vanillaConformanceTest/TEST-*.xml


  # ╭──────────────────────────────────────────────────────────────────────────╮
  # │ Policy (independent of tiers)                                            │
  # ╰──────────────────────────────────────────────────────────────────────────╯

  dependencies:
    name: Dependencies
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime,development,unknown

  commits:
    name: Commits
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Collect pushed commit subjects
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            git log --format=%s "$HEAD_SHA" > commit-subjects.txt
          elif git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null && git merge-base --is-ancestor "$BEFORE_SHA" "$HEAD_SHA" 2>/dev/null; then
            git log --format=%s "$BEFORE_SHA..$HEAD_SHA" > commit-subjects.txt
          else
            git log --format=%s -1 "$HEAD_SHA" > commit-subjects.txt
          fi

      - name: Validate commit subjects
        run: bash .github/scripts/validate-conventional-title.sh --stdin < commit-subjects.txt

  # ╭──────────────────────────────────────────────────────────────────────────╮
  # │ Status (required merge-gate check)                                       │
  # ╰──────────────────────────────────────────────────────────────────────────╯

  status:
    name: Status
    if: always()
    needs: [gate, changes, lint, build, vanilla, dependencies]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate
        env:
          EVENT_NAME: ${{ github.event_name }}
          GATE_RESULT: ${{ needs.gate.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          VANILLA_RESULT: ${{ needs.vanilla.result }}
          DEPS_RESULT: ${{ needs.dependencies.result }}
          GATE_RUN: ${{ needs.gate.outputs.run }}
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
        run: |
          set -euo pipefail
          gate="$GATE_RESULT"
          changes="$CHANGES_RESULT"
          lint="$LINT_RESULT"
          build="$BUILD_RESULT"
          vanilla="$VANILLA_RESULT"
          deps="$DEPS_RESULT"
          run="$GATE_RUN"
          code="$CODE_CHANGED"

          if [[ "$gate" == "failure" || "$gate" == "cancelled" ]]; then
            echo "::error::Gate failed ($gate)"
            exit 1
          fi

          if [[ "$run" != "true" ]]; then
            if [[ "$EVENT_NAME" == "push" ]]; then
              echo "::notice::Skipped (release-please merge commit)."
            else
              echo "::notice::Skipped (pure release-please PR)."
            fi
            exit 0
          fi

          if [[ "$changes" == "failure" || "$changes" == "cancelled" ]]; then
            echo "::error::Change detection failed ($changes)"
            exit 1
          fi

          if [[ "$code" != "true" ]]; then
            echo "::notice::Skipped (no code paths changed)."
            exit 0
          fi

          if [[ "$lint" != "success" ]]; then
            echo "::error::Lint: $lint"
            exit 1
          fi

          if [[ "$build" != "success" ]]; then
            echo "::error::Build: $build"
            exit 1
          fi

          if [[ "$vanilla" == "failure" ]]; then
            echo "::error::Vanilla conformance: $vanilla"
            exit 1
          fi

          if [[ "$deps" == "failure" ]]; then
            echo "::error::Dependencies: $deps"
            exit 1
          fi

          echo "::notice::All required checks passed."
