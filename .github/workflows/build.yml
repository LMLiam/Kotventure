name: Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tasks:
        description: Gradle tasks (space-separated). Empty uses the default CI task set, or :module:build when module is set.
        required: false
        default: ''
        type: string
      module:
        description: Optional Gradle project name (e.g. core, minimessage). Empty runs the full multi-project default.
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Heavy CI gate
    uses: ./.github/workflows/heavy-ci-gate.yml
    permissions:
      contents: read
      pull-requests: read

  changes:
    name: Detect code changes
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.resolve.outputs.code }}
    steps:
      - name: Checkout
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Path filter
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: .github/code-paths-filter.yml

      - name: Resolve code-change flag
        id: resolve
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Format and lint
    needs: [gate, changes]
    if: needs.gate.outputs.run == 'true' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Check one type declaration per file
        run: bash .github/scripts/check-one-declaration-per-file.sh

      - name: Run Spotless and ktlint
        run: |
          set -euo pipefail
          ./gradlew spotlessCheck ktlintCheck 2>&1 | tee lint.log

      - name: Write job summary
        if: always()
        env:
          GRADLE_TASKS: spotlessCheck ktlintCheck
        run: bash .github/scripts/write-gradle-job-summary.sh lint.log

  gradle:
    name: Gradle build
    needs: [gate, changes]
    if: needs.gate.outputs.run == 'true' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Resolve Gradle tasks
        id: tasks
        env:
          INPUT_TASKS: ${{ github.event.inputs.tasks || '' }}
          INPUT_MODULE: ${{ github.event.inputs.module || '' }}
        run: |
          set -euo pipefail
          tasks="${INPUT_TASKS#"${INPUT_TASKS%%[![:space:]]*}"}"
          tasks="${tasks%"${tasks##*[![:space:]]}"}"
          module="${INPUT_MODULE#"${INPUT_MODULE%%[![:space:]]*}"}"
          module="${module%"${module##*[![:space:]]}"}"

          if [[ -n "$module" && ! "$module" =~ ^[A-Za-z0-9_-]+$ ]]; then
            echo "Invalid module name: $module" >&2
            exit 1
          fi

          if [[ -z "$tasks" ]]; then
            if [[ -n "$module" ]]; then
              tasks=":${module}:build"
            else
              tasks="build dokkaGenerate koverXmlReport koverHtmlReport"
            fi
          fi

          echo "tasks=$tasks" >> "$GITHUB_OUTPUT"
          echo "Resolved Gradle tasks: $tasks"

      - name: Run build, tests, and coverage
        env:
          GRADLE_TASKS: ${{ steps.tasks.outputs.tasks }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          ./gradlew ${GRADLE_TASKS} 2>&1 | tee gradle.log

      - name: Write job summary
        if: always()
        env:
          GRADLE_TASKS: ${{ steps.tasks.outputs.tasks }}
        run: bash .github/scripts/write-gradle-job-summary.sh gradle.log

      - name: Publish JUnit test report
        if: always()
        uses: ./.github/actions/publish-junit-report
        with:
          check_name: Gradle Test Report
          report_paths: modules/*/build/test-results/test/TEST-*.xml

      - name: Upload test results and reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-results
          path: |
            modules/*/build/test-results/test
            modules/*/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/kover
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build artifacts
        if: failure() || (github.event_name == 'push' && github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-build-artifacts
          path: build/libs
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build, Test, and Lint
    if: always()
    needs: [gate, changes, lint, gradle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate required check
        run: |
          set -euo pipefail
          gate="${{ needs.gate.result }}"
          changes="${{ needs.changes.result }}"
          lint="${{ needs.lint.result }}"
          gradle="${{ needs.gradle.result }}"
          run="${{ needs.gate.outputs.run }}"
          code="${{ needs.changes.outputs.code }}"

          if [[ "$gate" == "failure" || "$gate" == "cancelled" ]]; then
            echo "Heavy CI gate did not succeed ($gate)"
            exit 1
          fi

          if [[ "$run" != "true" ]]; then
            echo "Skipped Gradle jobs (pure release-please allow-list PR)."
            exit 0
          fi

          if [[ "$changes" == "failure" || "$changes" == "cancelled" ]]; then
            echo "Change detection did not succeed ($changes)"
            exit 1
          fi

          if [[ "$code" != "true" ]]; then
            echo "Skipped Gradle jobs (no code paths changed)."
            exit 0
          fi

          if [[ "$lint" == "success" && "$gradle" == "success" ]]; then
            exit 0
          fi

          echo "Format and lint: $lint"
          echo "Gradle build: $gradle"
          exit 1
