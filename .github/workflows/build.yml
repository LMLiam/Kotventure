name: Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Heavy CI gate
    uses: ./.github/workflows/heavy-ci-gate.yml
    permissions:
      contents: read
      pull-requests: read

  changes:
    name: Detect code changes
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: .github/code-paths-filter.yml

  gradle:
    name: Gradle build
    needs: [gate, changes]
    if: needs.gate.outputs.run == 'true' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Run build, tests, coverage, and formatting checks
        run: ./gradlew build dokkaGenerate koverXmlReport koverHtmlReport spotlessCheck ktlintCheck --no-daemon

      - name: Publish JUnit test report
        if: always()
        uses: ./.github/actions/publish-junit-report
        with:
          check_name: Gradle Test Report
          report_paths: modules/*/build/test-results/test/TEST-*.xml

      - name: Upload test results and reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-results
          path: |
            modules/*/build/test-results/test
            modules/*/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/kover
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-build-artifacts
          path: build/libs
          if-no-files-found: ignore
          retention-days: 7

  # Required status check: always reports so path-only / release-please skips do not block merges.
  build:
    name: Build, Test, and Lint
    if: always()
    needs: [gate, changes, gradle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate required check
        run: |
          set -euo pipefail
          gate="${{ needs.gate.result }}"
          changes="${{ needs.changes.result }}"
          gradle="${{ needs.gradle.result }}"
          run="${{ needs.gate.outputs.run }}"
          code="${{ needs.changes.outputs.code }}"

          if [[ "$gate" == "failure" || "$gate" == "cancelled" ]]; then
            echo "Heavy CI gate did not succeed ($gate)"
            exit 1
          fi

          if [[ "$run" != "true" ]]; then
            echo "Skipped Gradle build (pure release-please allow-list PR)."
            exit 0
          fi

          if [[ "$changes" == "failure" || "$changes" == "cancelled" ]]; then
            echo "Change detection did not succeed ($changes)"
            exit 1
          fi

          if [[ "$code" != "true" ]]; then
            echo "Skipped Gradle build (no code paths changed)."
            exit 0
          fi

          if [[ "$gradle" == "success" ]]; then
            exit 0
          fi

          echo "Gradle build result: $gradle"
          exit 1
