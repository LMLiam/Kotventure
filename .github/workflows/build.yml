name: Build

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  gate:
    name: Heavy CI gate
    uses: ./.github/workflows/heavy-ci-gate.yml
    permissions:
      contents: read
      pull-requests: read

  build:
    name: Build, Test, and Lint
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK and Gradle
        uses: ./.github/actions/setup-jdk-gradle

      - name: Run build, tests, coverage, and formatting checks
        run: ./gradlew build dokkaGenerate koverXmlReport koverHtmlReport spotlessCheck ktlintCheck --no-daemon

      - name: Publish JUnit test report
        if: always()
        uses: ./.github/actions/publish-junit-report
        with:
          check_name: Gradle Test Report
          report_paths: modules/*/build/test-results/test/TEST-*.xml

      - name: Upload test results and reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-test-results
          path: |
            modules/*/build/test-results/test
            modules/*/build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/kover
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-build-artifacts
          path: build/libs
          if-no-files-found: ignore
          retention-days: 7
