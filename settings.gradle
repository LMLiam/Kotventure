pluginManagement {
    repositories {
        gradlePluginPortal()
        mavenLocal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

rootProject.name = 'KyoriAdventureDSL'

['core', 'core-api'].forEach {
    include it
    project(":$it").projectDir = file("modules/$it")
}